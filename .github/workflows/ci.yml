name: CI

on:
  push:
    branches: [ "master", "dev/master" ]
  pull_request:
    branches: [ "master", "dev/master" ]

env:
  CARGO_TERM_COLOR: always
  CARGO_NET_GIT_FETCH_WITH_CLI: true

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Configure git for private repos
        run: git config --global url."https://${{ secrets.GH_PAT }}@github.com/".insteadOf "https://github.com/"
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Configure git for private repos
        run: git config --global url."https://${{ secrets.GH_PAT }}@github.com/".insteadOf "https://github.com/"
      - name: Clone server-panel-rs
        run: git clone --depth 1 https://github.com/xflash-panda/server-panel-rs.git ../server-panel-rs
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --all-targets -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Configure git for private repos
        run: git config --global url."https://${{ secrets.GH_PAT }}@github.com/".insteadOf "https://github.com/"
      - name: Clone server-panel-rs
        run: git clone --depth 1 https://github.com/xflash-panda/server-panel-rs.git ../server-panel-rs
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --all-targets
